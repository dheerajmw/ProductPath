# Render Blueprint — ProductPath API
# Docs: docs/vercel-production.md
# If Blueprint shows errors, use "Manual Web Service" in docs/render-setup.md

version: "1"

services:
  - type: web
    name: productpath-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: bash scripts/render-build.sh
    startCommand: bash scripts/render-start.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: API_URL
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SESSION_COOKIE_SAMESITE
        value: none
